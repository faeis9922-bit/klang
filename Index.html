<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กลางrs - ระบบผู้ใช้งาน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }
        .page { display: none; }
        .page.active { display: block; }
        .nav-active { color: #2563eb; }
    </style>
</head>
<body class="pb-20">

    <div id="authPage" class="page active min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">
            <h2 class="text-3xl font-bold text-center mb-6 text-blue-600">กลางrs</h2>
            
            <div id="loginForm">
                <input type="email" id="loginEmail" placeholder="อีเมล" class="w-full p-3 mb-3 border rounded-xl">
                <input type="password" id="loginPass" placeholder="รหัสผ่าน" class="w-full p-3 mb-4 border rounded-xl">
                <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">เข้าสู่ระบบ</button>
                <p class="text-center mt-4 text-sm">ยังไม่มีบัญชี? <a href="javascript:toggleAuth()" class="text-blue-500">สมัครสมาชิก</a></p>
            </div>

            <div id="registerForm" class="hidden">
                <input type="email" id="regEmail" placeholder="อีเมล" class="w-full p-3 mb-3 border rounded-xl">
                <input type="password" id="regPass" placeholder="รหัสผ่าน" class="w-full p-3 mb-3 border rounded-xl">
                <hr class="my-4">
                <input type="text" id="regBankName" placeholder="ชื่อบัญชีธนาคาร" class="w-full p-3 mb-3 border rounded-xl">
                <input type="text" id="regBankNo" placeholder="เลขบัญชีธนาคาร" class="w-full p-3 mb-4 border rounded-xl">
                <button onclick="register()" class="w-full bg-green-600 text-white p-3 rounded-xl font-bold">ยืนยันสมัครสมาชิก</button>
                <p class="text-center mt-4 text-sm"><a href="javascript:toggleAuth()" class="text-gray-500">กลับไปหน้าล็อกอิน</a></p>
            </div>
        </div>
    </div>

    <div id="mainPage" class="page">
        <nav class="bg-white p-4 shadow-sm sticky top-0 flex justify-between items-center">
            <span class="font-bold text-blue-600 text-xl">กลางrs</span>
            <button onclick="logout()" class="text-red-400 text-sm">ออก</button>
        </nav>

        <div class="p-4 max-w-lg mx-auto space-y-4">
            <div class="bg-gradient-to-r from-blue-600 to-blue-400 p-8 rounded-[2rem] text-white shadow-lg">
                <p class="opacity-80">ยอดเงินคงเหลือ</p>
                <h2 class="text-5xl font-bold mt-2">฿ <span id="balanceDisp">0</span></h2>
                <p class="mt-4 text-sm bg-white/20 inline-block px-3 py-1 rounded-full">ใช้งานกลางไปแล้ว: <span id="countDisp">0</span> ครั้ง</p>
            </div>

            <div id="announceBox" class="bg-yellow-100 p-4 rounded-2xl border border-yellow-200 text-yellow-800 text-sm hidden">
                ⚠️ <span id="announceContent"></span>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm">
                <h3 class="font-bold text-lg mb-4">กิจกรรมรับเงินรางวัล</h3>
                <div id="activityContainer" class="space-y-4">
                    </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm">
                <h3 class="font-bold text-lg mb-4">ประวัติการเงิน</h3>
                <div id="historyContainer" class="space-y-3 text-sm">
                    </div>
            </div>
        </div>
    </div>

    <div id="profilePage" class="page p-4 max-w-lg mx-auto">
        <h2 class="text-2xl font-bold mb-6">จัดการโปรไฟล์</h2>
        <div class="bg-white p-6 rounded-3xl shadow-sm space-y-4">
            <div>
                <label class="text-xs text-gray-400">ชื่อบัญชีธนาคาร</label>
                <input type="text" id="editBankName" class="w-full p-3 border rounded-xl mt-1">
            </div>
            <div>
                <label class="text-xs text-gray-400">เลขบัญชีธนาคาร</label>
                <input type="text" id="editBankNo" class="w-full p-3 border rounded-xl mt-1">
            </div>
            <button onclick="updateProfile()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">บันทึกข้อมูล</button>
        </div>
    </div>

    <div id="bottomNav" class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 text-gray-400 hidden">
        <button onclick="showPage('mainPage')" id="nav-main" class="flex flex-col items-center nav-active">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px]">หน้าหลัก</span>
        </button>
        <button onclick="showPage('profilePage')" id="nav-profile" class="flex flex-col items-center">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[10px]">โปรไฟล์</span>
        </button>
        <a id="fbContact" href="#" target="_blank" class="flex flex-col items-center text-blue-500">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            <span class="text-[10px]">ติดต่อแอดมิน</span>
        </a>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyA8bS2o0--kQjdu0m4WXaUMXhWh7vGJerY",
            authDomain: "cczxvod.firebaseapp.com",
            projectId: "cczxvod",
            storageBucket: "cczxvod.firebasestorage.app",
            messagingSenderId: "360567380642",
            appId: "1:360567380642:web:f196257ad9215e30fa55fb",
            measurementId: "G-N8HVDQMJBG"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // AUTH LOGIC
        function toggleAuth() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
        }

        async function register() {
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const bName = document.getElementById('regBankName').value;
            const bNo = document.getElementById('regBankNo').value;

            try {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.collection("users").doc(res.user.uid).set({
                    email, bankName: bName, bankNo: bNo, balance: 0, transCount: 0, role: 'user'
                });
                alert("สมัครสมาชิกสำเร็จ!");
            } catch (e) { alert(e.message); }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            try { await auth.signInWithEmailAndPassword(email, pass); } catch (e) { alert(e.message); }
        }

        function logout() { auth.signOut(); window.location.reload(); }

        // NAVIGATION
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('#bottomNav button').forEach(b => b.classList.remove('nav-active'));
            if(pageId === 'mainPage') document.getElementById('nav-main').classList.add('nav-active');
            if(pageId === 'profilePage') document.getElementById('nav-profile').classList.add('nav-active');
        }

        // DATA LOADING
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authPage').classList.remove('active');
                document.getElementById('bottomNav').classList.remove('hidden');
                showPage('mainPage');
                
                // Real-time User Data
                db.collection("users").doc(user.uid).onSnapshot(doc => {
                    const d = doc.data();
                    document.getElementById('balanceDisp').innerText = d.balance.toLocaleString();
                    document.getElementById('countDisp').innerText = d.transCount;
                    document.getElementById('editBankName').value = d.bankName;
                    document.getElementById('editBankNo').value = d.bankNo;
                });

                // Load Misc
                loadActivities();
                loadHistory(user.uid);
                loadSettings();
            } else {
                document.getElementById('authPage').classList.add('active');
            }
        });

        async function loadActivities() {
            db.collection("activities").where("status", "==", "active").onSnapshot(snap => {
                let html = '';
                snap.forEach(doc => {
                    const act = doc.data();
                    html += `
                        <div class="flex justify-between items-center p-4 border rounded-2xl bg-gray-50">
                            <div>
                                <p class="font-bold">${act.name}</p>
                                <p class="text-xs text-gray-500">เป้าหมาย: ${act.target} รอบ</p>
                            </div>
                            <div class="text-right">
                                <span class="text-green-600 font-bold">+฿${act.reward}</span>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('activityContainer').innerHTML = html || 'ไม่มีกิจกรรมในขณะนี้';
            });
        }

        async function loadHistory(uid) {
            db.collection("history").where("uid", "==", uid).orderBy("date", "desc").limit(10).onSnapshot(snap => {
                let html = '';
                snap.forEach(doc => {
                    const h = doc.data();
                    const date = h.date.toDate().toLocaleDateString('th-TH');
                    html += `
                        <div class="flex justify-between border-b pb-2">
                            <span>${h.type} <br><small class="text-gray-400">${date}</small></span>
                            <span class="${h.amount >= 0 ? 'text-green-500' : 'text-red-500'} font-bold">
                                ${h.amount >= 0 ? '+' : ''}${h.amount}
                            </span>
                        </div>
                    `;
                });
                document.getElementById('historyContainer').innerHTML = html || 'ไม่มีประวัติรายการ';
            });
        }

        async function loadSettings() {
            db.collection("settings").doc("main").onSnapshot(doc => {
                if(doc.exists) {
                    const s = doc.data();
                    if(s.announce) {
                        document.getElementById('announceBox').classList.remove('hidden');
                        document.getElementById('announceContent').innerText = s.announce;
                    }
                    document.getElementById('fbContact').href = s.fbLink || "#";
                }
            });
        }

        async function updateProfile() {
            const uid = auth.currentUser.uid;
            await db.collection("users").doc(uid).update({
                bankName: document.getElementById('editBankName').value,
                bankNo: document.getElementById('editBankNo').value
            });
            alert("บันทึกข้อมูลเรียบร้อย!");
        }
    </script>
</body>
</html>
